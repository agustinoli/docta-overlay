<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador - hayequipo.png</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #map_canvas {
            width: 100%;
            height: 100%;
        }
        .btn-ubicacion {
            position: absolute;
            bottom: 24px;
            right: 15px;
            z-index: 5;
            background-color: #fff;
            border: 0;
            border-radius: 2px;
            box-shadow: rgba(0, 0, 0, 0.3) 0px 1px 4px -1px;
            margin: 10px;
            padding: 0px 10px;
            height: 40px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
        }
        .btn-ubicacion:hover {
            background-color: #f4f4f4;
            color: #333;
        }
    </style>
</head>
<body>

    <button class="btn-ubicacion" id="btnUbicacion">Mi Ubicación</button>

    <div id="map_canvas"></div>

    <script>
      let map;
      let userMarker;

      function initMap() {
        // 1. Inicializar el mapa centrado inicialmente en la zona general
        map = new google.maps.Map(document.getElementById("map_canvas"), {
          zoom: 15,
          center: { lat: -31.4167, lng: -64.1833 },
          mapTypeId: 'roadmap'
        });

        // 2. Límites de la imagen de tu urbanización (ajusta según tu plano real)
        const imageBounds = {
          south: -31.455776,
          west: -64.318015,
          north: -31.435316,
          east: -64.281694,
        };

        // 3. Superposición del plano de lotes (hayequipo.png)
        const urbanizacionOverlay = new google.maps.GroundOverlay(
          "hayequipo.png",
          imageBounds,
          { 
            opacity: 0.85, // Un poco más opaco para ver bien las subdivisiones de los lotes
            clickable: false 
          }
        );
        urbanizacionOverlay.setMap(map);

        // 4. Activar el rastreo de ubicación del usuario
        trakearUbicacionUsuario();
      }

      function trakearUbicacionUsuario() {
        // Verificar si el navegador soporta Geolocalización
        if (navigator.geolocation) {
          
          // watchPosition actualiza la ubicación automáticamente si el usuario se mueve
          navigator.geolocation.watchPosition(
            (position) => {
              const pos = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
              };

              // Si el marcador ya existe, solo movemos su posición
              if (userMarker) {
                userMarker.setPosition(pos);
              } else {
                // Si no existe, creamos el marcador del usuario (Personalizado Azul)
                userMarker = new google.maps.Marker({
                  position: pos,
                  map: map,
                  title: "Estás aquí",
                  icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: "#4285F4", // Azul Google
                    fillOpacity: 1,
                    strokeColor: "#ffffff",
                    strokeWeight: 2,
                  }
                });
                
                // La primera vez que encuentra al usuario, centra el mapa en él
                map.setCenter(pos);
              }

              // Configurar el botón físico para centrar manualmente cuando el usuario quiera
              document.getElementById("btnUbicacion").addEventListener("click", () => {
                map.setCenter(pos);
                map.setZoom(17); // Zoom más cercano para ver el lote exacto
              });
            },
            () => {
              console.log("Error: Falló el servicio de geolocalización o se denegaron permisos.");
            },
            {
              enableHighAccuracy: true, // Fuerza al dispositivo a usar el GPS de alta precisión
              maximumAge: 0,
              timeout: 5000
            }
          );
        } else {
          console.log("Error: Tu navegador no soporta geolocalización.");
        }
      }
    </script>

    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBaJ0OWLpoI32N27anFam7-8qcJpqS8QxA&callback=initMap">
    </script>
</body>
</html>
