<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Urbanización - Docta Tiles</title>
    <link rel="manifest" href="manifest.json">
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="floating-panel opacity-panel">
        <label for="fader">Opacidad Plano</label>
        <input type="range" id="fader" min="0" max="1" step="0.01" value="0.8">
        <span id="opacityValue" class="opacity-value">80%</span>
    </div>

    <div class="action-bar">
        <button class="btn-action btn-gps" id="btnCentrar">
            <span>📍</span> Centrar GPS
        </button>
        <button class="btn-action btn-whatsapp" id="btnCompartir">
            <i class="fab fa-whatsapp" style="font-size: 20px; margin-right: 12px;"></i>
            Enviar por WhatsApp
        </button>
        <button class="btn-action btn-info" id="btnInfo">
            <span>ℹ️</span> Info
        </button>
    </div>

    <div id="map_canvas"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/key.js"></script>

    <script>
        // Verificación de seguridad en consola
        if (typeof GOOGLE_MAPS_API_KEY !== 'undefined' && GOOGLE_MAPS_API_KEY) {
            console.log("PWA: API Key cargada con éxito. Inicializando mapa...");
            
            // Creamos la etiqueta de script de Google Maps dinámicamente usando la clave cargada en memoria
            const scriptGoogle = document.createElement('script');
            scriptGoogle.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&loading=async&callback=initMap&v=weekly`;
            scriptGoogle.defer = true;
            scriptGoogle.async = true;
            document.head.appendChild(scriptGoogle);
        } else {
            console.error("ERROR CRÍTICO: No se pudo cargar Google Maps porque GOOGLE_MAPS_API_KEY no está definida.");
        }
    </script>
    
    <script src="js/map.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
